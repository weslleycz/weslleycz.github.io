<script type="text/javascript">
jQuery(document).ready(function($){
     $(window).scroll(function() {
    if ($(this).scrollTop() > 10) {
        $('#back').fadeIn();
    } else {
        $('#back').fadeOut();
    }
    });
    $("#back").click(function() {

        scrollTop: 0
        }, 800);

    });
